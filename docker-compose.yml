version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: voiceai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: voiceai
      POSTGRES_PASSWORD: voiceai_pass
      POSTGRES_DB: voiceai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./packages/server/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./packages/server/src/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voiceai"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: voiceai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
